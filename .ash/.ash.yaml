# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/main/automated_security_helper/schemas/AshConfig.json
project_name: sample-agent-assisted-sdlc
global_settings:
  severity_threshold: HIGH
  ignore_paths:
    - "SECURITY-PRACTICES.md"
    - "SCAN-FINDINGS.md"
    - "security-scans/"
    - "node_modules/"
    - ".venv/"
  suppressions:
    - rule_id: B104
      path: "coding-assistants/claude-code/runtime/main.py"
      reason: "AgentCore Runtime service contract requires binding to 0.0.0.0:8080."
    - rule_id: B104
      path: "coding-assistants/codex/runtime/main.py"
      reason: "AgentCore Runtime service contract requires binding to 0.0.0.0:8080."
    - rule_id: B104
      path: "coding-assistants/kiro/runtime/main.py"
      reason: "AgentCore Runtime service contract requires binding to 0.0.0.0:8080."
    - rule_id: B104
      path: "gateway/developer-mcp-servers/cfn-docs/main.py"
      reason: "MCP server binds 0.0.0.0:8000 per AgentCore service contract."
    - rule_id: B104
      path: "project-management/github/mcp/main.py"
      reason: "MCP server binds 0.0.0.0:8000 per AgentCore service contract."
    - rule_id: B104
      path: "source-control/github/mcp/main.py"
      reason: "MCP server binds 0.0.0.0:8000 per AgentCore service contract."
    - rule_id: B310
      path: "project-management/github/mcp/main.py"
      reason: "urllib HTTPS calls to api.github.com only."
    - rule_id: B310
      path: "source-control/github/mcp/main.py"
      reason: "urllib HTTPS calls to api.github.com only."
    - rule_id: B113
      path: "project-management/shared/pipeline.py"
      reason: "False positive - timeout parameter is present."
    - rule_id: CKV2_GHA_1
      path: ".github/workflows/ci.yml"
      reason: "Permissions set at job level, not write-all."
    - rule_id: SECRET-AWS-ACCESS-KEY
      path: "test/hooks/test_hooks.sh"
      reason: "Intentional test fixture - verifies secret-guard blocks AWS keys."
    - rule_id: SECRET-BASE64-HIGH-ENTROPY-STRING
      path: "test/hooks/test_hooks.sh"
      reason: "Intentional test fixture - fake token for hook testing."
    - rule_id: SECRET-PRIVATE-KEY
      path: "test/hooks/test_hooks.sh"
      reason: "Intentional test fixture - verifies secret-guard blocks PEM keys."
    - rule_id: SECRET-SLACK-TOKEN
      path: "test/hooks/test_hooks.sh"
      reason: "Intentional test fixture - verifies secret-guard blocks Slack tokens."
    - rule_id: SECRET-AWS-ACCESS-KEY
      path: "test-scripts/claude-code/test-security-hooks.sh"
      reason: "Intentional test fixture - verifies secret-guard blocks AWS keys."
    - rule_id: SECRET-PRIVATE-KEY
      path: "test-scripts/claude-code/test-security-hooks.sh"
      reason: "Intentional test fixture - verifies secret-guard blocks PEM keys."
fail_on_findings: true
ash_plugin_modules: []
external_reports_to_include: []
converters:
  archive:
    enabled: true
    options: {}
  jupyter:
    enabled: true
    options:
      tool_version: '>=7.16.0,<8.0.0'
      install_timeout: 300
scanners:
  bandit:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      confidence_level: all
      ignore_nosec: false
      excluded_paths: []
      additional_formats: []
      tool_version: '>=1.7.0,<2.0.0'
      install_timeout: 300
  cdk-nag:
    enabled: true
    options:
      severity_threshold: null
      nag_packs:
        AwsSolutionsChecks: true
        HIPAASecurityChecks: false
        NIST80053R4Checks: false
        NIST80053R5Checks: false
        PCIDSS321Checks: false
      include_compliant_checks: false
  cfn-nag:
    enabled: true
    options:
      severity_threshold: null
  checkov:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      skip_path: []
      additional_formats:
      - cyclonedx_json
      offline: false
      frameworks:
      - all
      skip_frameworks: []
      tool_version: null
      install_timeout: 300
  detect-secrets:
    enabled: true
    options:
      severity_threshold: null
      baseline_file: null
      scan_settings:
        version: null
        generated_at: null
        plugins_used: []
        filters_used: []
        results: {}
      scan_timeout: 300
  grype:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      offline: false
  npm-audit:
    enabled: true
    options:
      severity_threshold: null
      offline: false
  opengrep:
    enabled: true
    options:
      severity_threshold: null
      config: p/ci
      exclude:
      - '*-converted.py'
      - '*_report_result.txt'
      exclude_rule: []
      severity: []
      metrics: auto
      offline: false
      patterns: []
      version: v1.15.1
  semgrep:
    enabled: true
    options:
      severity_threshold: null
      config: p/ci
      exclude:
      - '*-converted.py'
      - '*_report_result.txt'
      exclude_rule: []
      severity: []
      metrics: auto
      offline: false
      tool_version: null
      install_timeout: 300
  syft:
    enabled: true
    options:
      severity_threshold: null
      config_file: null
      exclude: []
      additional_outputs:
      - syft-table
reporters:
  csv:
    enabled: true
    options: {}
  cyclonedx:
    enabled: true
    options: {}
  gitlab-cyclonedx:
    enabled: true
    options:
      category: production
      package_manager_override: null
      language_override: null
      input_file_path_override: null
  html:
    enabled: true
    options: {}
  flat-json:
    enabled: true
    options:
      include_scanner_metrics: true
      include_summary_metrics: true
      include_metadata: true
  gitlab-sast:
    enabled: true
    options:
      exclude_suppressed: false
  github-ghas:
    enabled: true
    options:
      exclude_suppressed: true
  junitxml:
    enabled: true
    options:
      respect_severity_threshold: true
  markdown:
    enabled: true
    options:
      include_summary: true
      include_findings_table: false
      include_detailed_findings: true
      max_detailed_findings: 20
      top_hotspots_limit: 10
      use_collapsible_details: true
      compact: false
  ocsf:
    enabled: true
    options: {}
  sarif:
    enabled: true
    options: {}
  spdx:
    enabled: false
    options: {}
  text:
    enabled: true
    options:
      include_summary: true
      include_findings_table: false
      include_detailed_findings: false
      max_detailed_findings: 20
      top_hotspots_limit: 20
  yaml:
    enabled: false
    options: {}
